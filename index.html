<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Omnicloud Global Operations Dashboard</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

.header{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
}

.cards{
    display:flex;
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:220px;
}

.label{
    color:#94a3b8;
}

.value{
    font-size:32px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
🌎 Omnicloud Global Operations Dashboard
</div>

<div class="cards">

<div class="card">
<div class="label">Top Country</div>
<div class="value">USA</div>
</div>

<div class="card">
<div class="label">Internet Traffic</div>
<div class="value">29.31%</div>
</div>

<div class="card">
<div class="label">Wildfires</div>
<div class="value">42</div>
</div>

<div class="card">
<div class="label">Power Outages</div>
<div class="value">18K</div>
</div>

</div>

</body>
</html>
